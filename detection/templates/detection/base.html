<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PlantGuard AI — Advanced plant disease detection powered by artificial intelligence. Upload leaf images for instant analysis.">
    <title>PlantGuard AI — Intelligent Plant Disease Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669;
            --primary-light: #10b981;
            --primary-dark: #047857;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --bg-dark: #0f172a;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-hover: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-border-hover: rgba(255, 255, 255, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --shadow-glow: 0 0 40px rgba(16, 185, 129, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Animated Background ===== */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(5, 150, 105, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 40% 40% at 10% 60%, rgba(245, 158, 11, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, #0f172a 0%, #0c1222 50%, #0a0f1a 100%);
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        .particle:nth-child(1) { left: 5%; animation-duration: 18s; animation-delay: 0s; font-size: 1.2rem; }
        .particle:nth-child(2) { left: 15%; animation-duration: 22s; animation-delay: 3s; font-size: 1.8rem; }
        .particle:nth-child(3) { left: 25%; animation-duration: 16s; animation-delay: 6s; }
        .particle:nth-child(4) { left: 40%; animation-duration: 20s; animation-delay: 1s; font-size: 1.1rem; }
        .particle:nth-child(5) { left: 55%; animation-duration: 24s; animation-delay: 4s; font-size: 2rem; }
        .particle:nth-child(6) { left: 65%; animation-duration: 17s; animation-delay: 8s; }
        .particle:nth-child(7) { left: 75%; animation-duration: 21s; animation-delay: 2s; font-size: 1.4rem; }
        .particle:nth-child(8) { left: 88%; animation-duration: 19s; animation-delay: 5s; font-size: 1.6rem; }
        .particle:nth-child(9) { left: 95%; animation-duration: 23s; animation-delay: 7s; font-size: 1rem; }
        .particle:nth-child(10) { left: 50%; animation-duration: 25s; animation-delay: 9s; font-size: 1.3rem; }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.15;
            }
            90% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ===== Navbar ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            background: rgba(15, 23, 42, 0.75);
            border-bottom: 1px solid var(--glass-border);
        }

        nav {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
            transition: var(--transition);
        }

        .logo:hover {
            color: var(--primary-light);
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a,
        .nav-links span {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: var(--radius-xs);
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-links .nav-user {
            color: var(--primary-light);
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            padding: 6px 16px;
        }

        .nav-links .btn-nav {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 20px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
        }

        .nav-links .btn-nav:hover {
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.4);
            transform: translateY(-1px);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: var(--radius-xs);
            font-family: inherit;
            transition: var(--transition);
        }

        .logout-btn:hover {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== Main Content ===== */
        main {
            flex: 1;
            position: relative;
            z-index: 1;
            padding: 2rem;
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
            }
            50% {
                box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
            }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ===== Glass Card ===== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 2rem;
            transition: var(--transition);
        }

        .glass-card:hover {
            border-color: var(--glass-border-hover);
            background: var(--bg-card-hover);
        }

        .glass-card-static {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 2rem;
        }

        /* ===== Headings ===== */
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.45);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--glass-border-hover);
        }

        .btn-full {
            width: 100%;
        }

        .btn-lg {
            padding: 16px 32px;
            font-size: 1.05rem;
        }

        /* ===== Form Elements ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xs);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        /* ===== Alert ===== */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        /* ===== Hero ===== */
        .hero {
            text-align: center;
            padding: 3rem 1rem 2rem;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 550px;
            margin: 1rem auto 0;
            line-height: 1.7;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        .hero-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary-light);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== Divider ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        /* ===== Footer ===== */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1.5rem 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            background: rgba(15, 23, 42, 0.5);
        }

        footer a {
            color: var(--primary-light);
            text-decoration: none;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            nav {
                padding: 0.75rem 1rem;
            }

            .logo {
                font-size: 1.1rem;
            }

            .nav-links {
                gap: 4px;
            }

            .nav-links a,
            .nav-links span,
            .logout-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }

            main {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .glass-card, .glass-card-static {
                padding: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links .nav-user {
                display: none;
            }

            h1 {
                font-size: 1.6rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ===== Selection ===== */
        ::selection {
            background: rgba(16, 185, 129, 0.3);
            color: white;
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="particles">
        <div class="particle">🌿</div>
        <div class="particle">🍃</div>
        <div class="particle">🌱</div>
        <div class="particle">☘️</div>
        <div class="particle">🌿</div>
        <div class="particle">🍀</div>
        <div class="particle">🌾</div>
        <div class="particle">🍃</div>
        <div class="particle">🌿</div>
        <div class="particle">🌱</div>
    </div>

    <!-- Navbar -->
    <header>
        <nav>
            <a href="{% url 'home' %}" class="logo" id="nav-logo">
                <span class="logo-icon">🌿</span>
                PlantGuard AI
            </a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                <span class="nav-user" id="nav-user">👤 {{ user.username }}</span>
                <a href="{% url 'home' %}" id="nav-analyze">Analyze</a>
                <a href="{% url 'history' %}" id="nav-history">History</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn" id="nav-logout">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" id="nav-login">Login</a>
                <a href="{% url 'signup' %}" class="btn-nav" id="nav-signup">Sign Up</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 PlantGuard AI — Empowering Agriculture with Artificial Intelligence</p>
    </footer>
</body>

</html>
